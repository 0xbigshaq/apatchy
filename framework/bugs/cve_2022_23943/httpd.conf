# CVE-2022-23943 - Integer overflow in mod_sed line buffer (sed1.c:104)
#
# Reproduce:
#   apatchy bug setup CVE-2022-23943
#   apatchy bug reproduce CVE-2022-23943
#
# Fuzz for variants:
#   apatchy fuzz --config bugs/cve_2022_23943/httpd.conf
ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog "/dev/stderr"
# LogLevel deflate:debug sed:debug
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
    AllowOverride none
</Directory>

<Location "/poc.html">
    # trigger bug
    AddOutputFilter Sed html
    OutputSed "s/(.)/b/g"
</Location>

<Location "/in.html">
    # Inflate gzipped requests, then process through Sed
    SetInputFilter DEFLATE;Sed
    InputSed "s/(.)/Z/g"

    # Disable gzip bomb protection so the full payload reaches mod_sed
    DeflateInflateRatioLimit 2000000
    DeflateInflateRatioBurst 100
</Location>
