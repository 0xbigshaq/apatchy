# CVE-2020-11984 - Integer truncation in mod_proxy_uwsgi (uwsgi_send_headers)
#
# Reproduce:
#   apatchy bug setup CVE-2020-11984
#   apatchy bug reproduce CVE-2020-11984
#
# Requires a running uwsgi backend:
#   uwsgi --socket 127.0.0.1:3032 --wsgi-file app.py --master --processes 1
# You can also `nc -lvp 3032`
#
# Fuzz for variants:
#   apatchy fuzz --config bugs/cve_2020_11984/httpd.conf
ServerName localhost:80
Timeout 2
ProxyTimeout 2
HttpProtocolOptions Unsafe
LimitRequestFieldSize 131072
DocumentRoot "/tmp/htdocs"
ErrorLog "/tmp/fuzz_error.log"
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
</Directory>

ProxyRequests Off
ProxyPass "/" "uwsgi://127.0.0.1:3032/"
ProxyPassReverse "/" "uwsgi://127.0.0.1:3032/"
