# configs/htaccess.conf - config for htaccess parser fuzzing
#
# Loads modules whose directive handlers we want to exercise.
# The actual directives come from fuzz input, not from this file.
ServerName localhost:80
HttpProtocolOptions Unsafe
DocumentRoot "/tmp/htdocs"
ErrorLog "/dev/stderr"
LogLevel emerg

<Directory "/">
    AllowOverride All
    AllowOverrideList All
    Require all granted
</Directory>
