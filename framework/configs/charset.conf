# configs/charset.conf
#
# mod_charset_lite request-body translation harness.
#
# On the INPUT path mod_charset_lite opens iconv as
#   apr_xlate_open(&xlate, charset_source, charset_default)  ->  iconv_open(topage=source, frompage=default)
# so the iconv *source* encoding (where incomplete multibyte sequences live) is
# CharsetDefault. Each location below pins CharsetDefault to a different multibyte
# ISO-2022-* charset (the "frompage"), with a single-byte CharsetSourceEnc target,
# so the body translation is non-single-byte (is_sb == 0) and the partial-char
# set_aside/finish path runs. The CharsetBody.target field selects the location.

ServerName localhost:80
Timeout 2
HttpProtocolOptions Unsafe
DocumentRoot "/tmp/htdocs"
ErrorLog "/dev/stdout"
LogLevel emerg
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
</Directory>

<Location "/jp">
    CharsetSourceEnc UTF-8
    CharsetDefault ISO-2022-JP
    SetInputFilter XLATEIN
</Location>

<Location "/jp2">
    CharsetSourceEnc UTF-8
    CharsetDefault ISO-2022-JP-2
    SetInputFilter XLATEIN
</Location>

<Location "/kr">
    CharsetSourceEnc UTF-8
    CharsetDefault ISO-2022-KR
    SetInputFilter XLATEIN
</Location>

<Location "/cn">
    CharsetSourceEnc UTF-8
    CharsetDefault ISO-2022-CN-EXT
    SetInputFilter XLATEIN
</Location>

LimitRequestFieldSize 100000
LimitRequestLine 100000
