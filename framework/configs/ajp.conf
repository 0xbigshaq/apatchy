# configs/ajp.conf
# setup: printf 'testuser:{SHA}%s\n' "$(printf 'testpass' | openssl dgst -sha1 -binary | base64)" > /tmp/htpasswd
ServerName localhost:80
Timeout 2
ProxyTimeout 2
HttpProtocolOptions Unsafe
DocumentRoot "/tmp/htdocs"
ErrorLog "/dev/stdout"
LogLevel emerg
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
</Directory>

ProxyRequests Off

<Location "/a">
    AuthType Basic
    AuthName "ajp"
    AuthBasicProvider file
    AuthUserFile /tmp/htpasswd
    Require valid-user
    ProxyPass "ajp://127.0.0.1:8009/a" secret=mysecret
    ProxyPassReverse "ajp://127.0.0.1:8009/a"
</Location>

<Location "/p">
    ProxyPass "ajp://127.0.0.1:8009/p" ping=1
    ProxyPassReverse "ajp://127.0.0.1:8009/p"
</Location>

<Location "/e">
    ProxyErrorOverride On
    ProxyPass "ajp://127.0.0.1:8009/e"
    ProxyPassReverse "ajp://127.0.0.1:8009/e"
</Location>

ProxyPass "/" "ajp://127.0.0.1:8009/" disablereuse=On
ProxyPassReverse "/" "ajp://127.0.0.1:8009/"

LimitRequestFieldSize 100000
LimitRequestLine 100000
