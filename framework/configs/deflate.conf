# configs/deflate.conf - mod_deflate config fuzzing
#
# Base configuration for deflate config+input fuzzing.  The harness
# patches these values in-memory per iteration, so the values here
# are just initial defaults.
ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog "/dev/stderr"
LogLevel emerg

<Directory "/">
    Require all granted

    # Dir-level deflate config (patched per-iteration by harness)
    SetInputFilter DEFLATE
    SetOutputFilter DEFLATE
    DeflateInflateRatioLimit 200
    DeflateInflateRatioBurst 3
</Directory>

# Server-level deflate config (patched per-iteration by harness)
DeflateWindowSize 15
DeflateMemLevel 9
DeflateCompressionLevel 6
DeflateBufferSize 8096
