# Apache HTTPD Configuration for Session Crypto Fuzzing
# Minimal version for fuzzing harness - no CGI, no rewrite rules

ServerName localhost:8080

# Minimal settings for fuzzing
Timeout 5
KeepAlive Off

# Note: Modules are compiled statically (--enable-mods-static=all)
# No LoadModule directives needed - all modules are built into httpd binary
# No Listen directive needed - fuzzer harness doesn't use real sockets

# Document root
DocumentRoot "/tmp/htdocs"

# Minimal logging for fuzzing
ErrorLog /tmp/fuzz_logs/error_log
LogLevel warn

# =================================================
# DIRECTORY CONFIGURATION
# =================================================

<Directory "/tmp/htdocs">
    Require all granted
</Directory>

# =================================================
# SESSION CONFIGURATION (Location matches URL paths)
# =================================================

<Location "/">
    # Enable sessions for all URLs
    Session On
    SessionEnv On
    SessionHeader X-Session-Save

    # Cookie-based session storage
    SessionCookieName session path=/

    # Force session save on every request (needed to trigger cookie_save path)
    SessionMaxAge 300

    # Session crypto (AES encryption)
    # Note: This key is for testing only!
    SessionCryptoPassphrase "fuzzing_test_key_1234567890abcdef"

    # Allow session headers
    Header set X-Decrypted-Incoming "In->%{HTTP_SESSION}e"
    Header set X-Session-Debug "Cookie:%{HTTP_COOKIE}e"
</Location>

# Root directory permissions
<Directory />
    Require all denied
</Directory>

# =================================================
# MIME TYPES
# =================================================
TypesConfig /dev/null
AddType text/html .html
AddType text/plain .txt
