# configs/proxy.conf
ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog "/tmp/fuzz_error.log"
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
</Directory>

# Enable proxy (note: actual proxying won't work without network)
# But we can still fuzz the request parsing and URL handling
ProxyRequests Off

<Location "/a">
    ProxyPass "http://localhost:8003/"
    ProxyPassReverse "http://localhost:8003/"
</Location>

# Proxy balancer config
<Proxy "balancer://mycluster">
    BalancerMember "http://localhost:8003"
    BalancerMember "http://127.0.0.1:8003"
</Proxy>
ProxyPass "/b" "balancer://mycluster/"
