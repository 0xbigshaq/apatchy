# Apache configuration for fuzzing mod_wsgi
#
# Runs mod_wsgi in embedded mode (no daemon processes) with a minimal
# WSGI application that echoes request data back, maximizing code paths
# through the module's request handling, input parsing, and response
# serialization.
#
# Before using this config:
#   mkdir -p /tmp/wsgi && cp configs/wsgi-app.py /tmp/wsgi/app.wsgi

LoadModule wsgi_module modules/mod_wsgi.so

ServerName localhost:80

HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0

ErrorLog "/tmp/fuzz_error.log"
LogLevel warn

DocumentRoot "/tmp/htdocs"
TypesConfig conf/mime.types

# Embedded mode only -- no daemon processes
WSGIRestrictEmbedded Off

# Route all requests to the WSGI app
WSGIScriptAlias / /tmp/wsgi/app.wsgi

<Directory "/tmp/wsgi">
    Require all granted
</Directory>
