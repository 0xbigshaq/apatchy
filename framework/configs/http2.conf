# configs/http2.conf - HTTP/2 (h2c) fuzzing config
ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog "/dev/stderr"
LogLevel emerg

Protocols h2c http/1.1
H2Direct on

<Directory "/">
    Require all granted
</Directory>