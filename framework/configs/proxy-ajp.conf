# configs/proxy-ajp.conf - Fuzz mod_proxy_ajp request parsing
ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog "/tmp/fuzz_error.log"
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
</Directory>

ProxyRequests Off

<Location "/ajp">
    ProxyPass "ajp://localhost:8009/"
    ProxyPassReverse "ajp://localhost:8009/"
</Location>

<Location "/ajp-secret">
    ProxyPass "ajp://localhost:8009/" secret=fuzzsecret
    ProxyPassReverse "ajp://localhost:8009/"
</Location>

<Proxy "balancer://ajpcluster">
    BalancerMember "ajp://localhost:8009"
    BalancerMember "ajp://127.0.0.1:8009"
</Proxy>

ProxyPass "/ajp-balanced" "balancer://ajpcluster/"

# AJP backend setup:
