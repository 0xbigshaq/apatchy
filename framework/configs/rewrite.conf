# configs/rewrite.conf - mod_rewrite fuzzing configuration
#
# Exercises: regex matching, backreference expansion ($N, %N),
# variable lookup (%{VAR}), internal RewriteMaps (tolower/toupper),
# query string handling ([QSA], [QSD], [QSL]), flag processing,
# condition evaluation, environment variable setting, cookie setting,
# and the [N] next-round loop.

ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog /dev/stderr
LogLevel emerg
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
</Directory>

RewriteEngine On

# -- Internal RewriteMaps ------------------------------------------
RewriteMap lc int:tolower
RewriteMap uc int:toupper

# -- Rule 1: Simple redirect with backreference -------------------
# Exercises: $1 backreference, [R,L] flags
RewriteRule ^/old/(.*)$ /new/$1 [R=302,L]

# -- Rule 2: RewriteCond on QUERY_STRING with %1 backref ----------
# Exercises: %{QUERY_STRING}, condition regex, %1 cond-backref
RewriteCond %{QUERY_STRING} ^id=([0-9]+)$
RewriteRule ^/item$ /item/%1 [L]

# -- Rule 3: tolower map on full URI ------------------------------
# Exercises: RewriteMap int:tolower, $1 with (.*)
RewriteCond %{REQUEST_URI} [A-Z]
RewriteRule ^/upper/(.*)$ /upper/${lc:$1} [L]

# -- Rule 4: toupper map ------------------------------------------
RewriteRule ^/shout/(.*)$ /shout/${uc:$1} [L]

# -- Rule 5: Multiple backreferences -----------------------------
# Exercises: $1, $2, $3 extraction from complex pattern
RewriteRule ^/user/([^/]+)/([^/]+)/([^/]+)$ /profile?name=$1&action=$2&id=$3 [L]

# -- Rule 6: QSA - append query string ---------------------------
# Exercises: [QSA] flag, query string merging
RewriteRule ^/search/(.*)$ /cgi/search?term=$1 [QSA,L]

# -- Rule 7: QSD - discard query string --------------------------
RewriteRule ^/clean/(.*)$ /static/$1 [QSD,L]

# -- Rule 8: Condition on HTTP header -----------------------------
# Exercises: %{HTTP:Host}, header lookup
RewriteCond %{HTTP:Host} ^www\.(.+)$
RewriteRule ^(.*)$ http://%1$1 [R=301,L]

# -- Rule 9: Condition on HTTP_USER_AGENT -------------------------
RewriteCond %{HTTP_USER_AGENT} (bot|crawl|spider) [NC]
RewriteRule ^/private/ - [F]

# -- Rule 10: Environment variable setting ------------------------
# Exercises: [E=var:val] flag, do_expand_env()
RewriteRule ^/track/(.*)$ /tracked/$1 [E=TRACKED:$1,L]

# -- Rule 11: Cookie setting -------------------------------------
# Exercises: [CO=name:value:domain] flag, do_expand_cookie()
RewriteRule ^/setcookie/(.*)$ /cookied/$1 [CO=fuzz:$1:localhost,L]

# -- Rule 12: Chained rules --------------------------------------
# Exercises: [C] chain flag - second rule only runs if first matches
RewriteRule ^/chain/(.*)$ /step1/$1 [C]
RewriteRule ^/step1/(.*)$ /chained/$1 [L]

# -- Rule 13: Skip flag ------------------------------------------
# Exercises: [S=N] skip flag
RewriteRule ^/skip$ - [S=2]
RewriteRule ^/skip$ /should-not-reach-1 [L]
RewriteRule ^/skip$ /should-not-reach-2 [L]

# -- Rule 14: Case-insensitive matching ---------------------------
# Exercises: [NC] no-case flag
RewriteRule ^/CaSe/(.*)$ /normalized/$1 [NC,L]

# -- Rule 15: No-escape flag -------------------------------------
# Exercises: [NE] no-escape flag, special chars in substitution
RewriteRule ^/hash/(.*)$ /page#$1 [NE,L]

# -- Rule 16: Passthrough ----------------------------------------
# Exercises: [PT] passthrough flag
RewriteRule ^/alias/(.*)$ /real/$1 [PT]

# -- Rule 17: Backreference escaping with [B] --------------------
# Exercises: escape_backref(), [B] flag, URL-encoding backrefs
RewriteRule ^/escape/(.*)$ /safe/$1 [B,L]

# -- Rule 18: THE_REQUEST condition -------------------------------
# Exercises: %{THE_REQUEST} variable (raw request line)
RewriteCond %{THE_REQUEST} ^(GET|POST|PUT|DELETE)\s
RewriteRule ^/method$ /method/%1 [L]

# -- Rule 19: REQUEST_FILENAME condition --------------------------
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^/fallback/(.*)$ /index.html [L]

# -- Rule 20: Multiple conditions (AND) --------------------------
RewriteCond %{HTTP:Accept} text/html [NC]
RewriteCond %{REQUEST_URI} !\.css$
RewriteCond %{REQUEST_URI} !\.js$
RewriteRule ^/multi/(.*)$ /html/$1 [L]

# -- Rule 21: OR conditions --------------------------------------
RewriteCond %{HTTP:X-Custom} ^needle$ [OR]
RewriteCond %{QUERY_STRING} needle
RewriteRule ^/or/(.*)$ /found/$1 [L]

# -- Rule 22: Complex regex with alternation ----------------------
RewriteRule ^/(api|rest|v[0-9]+)/([^/]+)/(.*)$ /handler?version=$1&resource=$2&path=$3 [QSA,L]

# -- Rule 23: Nested map reference -------------------------------
# Exercises: nested ${map:$N} expansion in do_expand()
RewriteRule ^/nested/(.*)$ /result/${lc:${uc:$1}} [L]

# -- Rule 24: SERVER_NAME and SERVER_PORT variables ---------------
RewriteCond %{SERVER_PORT} ^443$
RewriteRule ^(.*)$ http://%{SERVER_NAME}$1 [R=301,L]

# -- Rule 25: REMOTE_ADDR condition ------------------------------
RewriteCond %{REMOTE_ADDR} ^192\.168\.
RewriteRule ^/internal/(.*)$ /local/$1 [L]

# -- Rule 26: Negative lookahead style (negated condition) --------
RewriteCond %{REQUEST_URI} !^/allowed
RewriteRule ^/restricted/(.*)$ - [F]

# -- Rule 27: Forced MIME type ------------------------------------
# Exercises: [T=] type flag
RewriteRule ^/download/(.*)\.dat$ $1.dat [T=application/octet-stream,L]

# -- Rule 28: Handler forcing ------------------------------------
# Exercises: [H=] handler flag
RewriteRule ^/cgi/(.*)$ /scripts/$1 [H=cgi-script,L]

# -- Rule 29: Next round with limit ------------------------------
# Exercises: [N] flag, loop counter, URI length check
# Strips one leading "x" per round, exercises the loop path
RewriteRule ^/(x+)(.*)$ /$2 [N=100]

# -- Rule 30: Catch-all with %{REQUEST_URI} ----------------------
RewriteCond %{REQUEST_URI} ^/catchall
RewriteRule ^/catchall/(.*)$ /caught?uri=$1&qs=%{QUERY_STRING} [L]
