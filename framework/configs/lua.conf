# configs/lua.conf - Comprehensive mod_lua fuzzing
# Setup: mkdir -p /tmp/htdocs && cp configs/handler.lua /tmp/htdocs/
ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog "/dev/stderr"
LogLevel emerg

<Directory "/">
    Require all granted
</Directory>

LuaMapHandler ".*" /tmp/htdocs/handler.lua
