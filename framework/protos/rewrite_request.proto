enum RewriteQueryString {
  QS_ID_42 = 0;
  QS_ID_HUGE = 1;
  QS_ID_NEG = 2;
  QS_ID_ZERO = 3;
  QS_ID_ALPHA = 4;
  QS_BARE_NEEDLE = 5;
  QS_MANY_PARAMS = 6;
  QS_NULL_BYTE = 7;
  QS_CRLF_INJECT = 8;
  QS_HELLO_WORLD = 9;
  QS_REDIRECT = 10;
  QS_PATH_TRAVERSAL = 11;
  QS_EMPTY = 12;
  QS_LONG_VALUE = 13;
  QS_NULL_NULL = 14;
  QS_SQLI = 15;
  QS_XSS = 16;
  QS_DUPE_KEYS = 17;
}

enum SegMutation {
  SEG_DOTDOT = 0;
  SEG_DOT = 1;
  SEG_DOTDOT_ENC = 2;
  SEG_NULL = 3;
  SEG_AAAA = 4;
  SEG_NULL_MID = 5;
  SEG_JNDI = 6;
  SEG_CRLF = 7;
  SEG_BACKSLASH = 8;
  SEG_DOUBLE_SLASH = 9;
  SEG_A = 10;
  SEG_LONG_A = 11;
}

message RewriteRequest {
  required HttpRequest http = 1;
  optional RewriteUri uri_override = 2;
  optional RewriteQueryString query_override = 3;
  optional SegMutation path_segment_mutation = 4;
  optional bool use_long_path = 5 [default = false];
  optional uint32 long_path_variant = 6 [default = 0];
  optional uint32 long_path_depth = 7 [default = 50];
}
