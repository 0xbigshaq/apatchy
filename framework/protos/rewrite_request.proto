syntax = "proto2";

import "http_request.proto";

enum RewriteUri {
  RW_FOO_BAR = 0;
  RW_TRAVERSAL = 1;
  RW_TRAVERSAL_ENC = 2;
  RW_NULL_BYTE = 3;
  RW_PLAIN_A = 4;
  RW_UPPER = 5;
  RW_MIXED_CASE = 6;
  RW_ENCODED_SLASH = 7;
  RW_HYPHEN = 8;
  RW_ADMIN_DEEP = 9;
  RW_MULTI_NULL = 10;
  RW_LONG_SEGMENTS = 11;
  RW_TEST = 12;
  RW_AMPERSAND_ENC = 13;
  RW_B_CLEAN = 14;
  RW_B_TRACK = 15;
  RW_B_SETCOOKIE = 16;
  RW_B_CHAIN = 17;
  RW_B_DOWNLOAD = 18;
  RW_B_CGI = 19;
  RW_B_SHORT_X = 20;
  RW_B_LONG_X = 21;
  RW_B_XXX_FOO = 22;
  RW_B_CATCHALL = 23;
  RW_ROOT = 24;
  RW_EMPTY = 25;
  RW_C_DEEP_TRAVERSAL = 26;
  RW_QS_FRAGMENT = 27;
  RW_D_MULTI_TRAVERSAL = 28;
  RW_D_REWRITE_LOOP = 29;
  RW_D_CONTROL_CHARS = 30;
  RW_D_OLD_SPACES = 31;
  RW_D_UTF8 = 32;
  RW_D_ZWSP = 33;
  RW_D_DOUBLE_ENC = 34;
  RW_D_DOUBLE_ENC2 = 35;
