# Apache configuration for fuzzing mod_pwn
#
# This configuration enables the intentionally vulnerable mod_pwn module
# for fuzzing and security testing.
#
# VULNERABILITIES AVAILABLE:
# - Stack buffer overflow (X-Pwn-Overflow header)
# - Heap buffer overflow (X-Pwn-Heap header)
# - Use-after-free (X-Pwn-UAF header)
# - NULL pointer dereference (X-Pwn-Null header)
# - Integer overflow (X-Pwn-Integer header)
# - Format string (X-Pwn-Format header)
# - Double free (X-Pwn-Double header)
# - Out-of-bounds read (/pwn/oob/<index>)
# - Path traversal (/pwn/read?file=<path>)
# - Crash (/pwn/crash)

# Load mod_pwn as a DSO (built by: fuzzer module build mod_pwn)
LoadModule pwn_module modules/mod_pwn.so

ServerName localhost:80

# Relax HTTP protocol checking for fuzzing
HttpProtocolOptions Unsafe

# Disable timeouts (we're not using real sockets)
RequestReadTimeout handshake=0 header=0 body=0

# Logging configuration
ErrorLog "/tmp/fuzz_error.log"
LogLevel warn

# Document root
DocumentRoot "/tmp/htdocs"

# Mime types
TypesConfig conf/mime.types

# Enable mod_pwn for all requests
<Location />
    SetHandler pwn-handler
    PwnEnabled On
    # Intentionally don't set PwnSecret to trigger NULL deref bugs
</Location>

# Alternative: enable for /pwn path only
#<Location /pwn>
#    SetHandler pwn-handler
#    PwnEnabled On
#</Location>
