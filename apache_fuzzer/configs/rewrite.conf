# configs/rewrite.conf
ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog "/tmp/fuzz_error.log"
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
</Directory>

# Enable mod_rewrite
RewriteEngine On
LogLevel rewrite:trace3

# Test various rewrite patterns
RewriteCond %{REQUEST_URI} ^/old/(.*)$
RewriteRule ^/old/(.*) /new/$1 [R=302,L]

RewriteCond %{QUERY_STRING} ^id=([0-9]+)$
RewriteRule ^/item$ /item/%1 [L]

RewriteMap lowercase int:tolower
RewriteRule ^/(.*)$ /${lowercase:$1} [L]
