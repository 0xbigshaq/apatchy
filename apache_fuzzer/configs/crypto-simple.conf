# Apache HTTPD Configuration for Cookie/Header Fuzzing
# Simplified version that works without mod_session_crypto
#
# This tests:
# - Cookie header parsing
# - Set-Cookie header generation
# - Header injection
# - CGI integration with cookies

ServerName localhost:8080

# Minimal settings for fuzzing
Timeout 5
KeepAlive Off
MaxRequestWorkers 1

# Listen on localhost only
Listen 127.0.0.1:8080

# Document root
DocumentRoot "/tmp/htdocs"

# Minimal logging for fuzzing
ErrorLog /tmp/fuzz_logs/error_log
LogLevel warn

# =================================================
# CGI SCRIPTS FOR COOKIE TESTING
# =================================================

# Alias for cookie setter
Alias "/set-cookie" "/tmp/htdocs/set-cookie.sh"

# Alias for cookie getter
Alias "/get-cookie" "/tmp/htdocs/get-cookie.sh"

# =================================================
# DIRECTORY CONFIGURATION
# =================================================

<Directory "/tmp/htdocs">
    Options +ExecCGI
    AddHandler cgi-script .sh
    Require all granted

    # Allow cookie manipulation
    Header set X-Cookie-Debug "Cookie:%{HTTP_COOKIE}e"
</Directory>

# Root directory permissions
<Directory />
    Require all denied
</Directory>

# =================================================
# MIME TYPES
# =================================================
TypesConfig /dev/null
AddType text/html .html
AddType text/plain .txt
AddType application/x-httpd-cgi .sh
