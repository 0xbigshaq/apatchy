# Apache HTTPD Configuration for Session Coverage Fuzzing
# Multi-route config that exercises different mod_session code paths
#
# Routes:
#   /a  - Encrypted session (crypto encode/decode)
#   /b  - Plain session (identity_decode loop, identity_concat '&')
#   /c  - SessionHeader override (session_output_filter override path)
#   /d  - Include/Exclude filtering (session_included logic)
#   /e  - ExpiryUpdateInterval (set_session_expiry_update)
#   /f  - Auth form login (ap_session_set via mod_auth_form)
#   /g  - Protected area (ap_session_get via mod_auth_form)
#   /h  - Auth form logout (ap_session_set with NULL)
#   /i  - SessionCookieName2 only (RFC2965 cookie, set_cookie_name2)
#   /j  - Both SessionCookieName + SessionCookieName2 (dual cookie save)
#   /k  - SessionCookieRemove On (set_remove, cookie stripping)
#   /l  - Empty session save via SessionHeader (ap_cookie_remove path)
#
# Setup requirements:
#   mkdir -p /tmp/htdocs /tmp/fuzz_logs
#   cp apache_fuzzer/configs/htpasswd /tmp/htpasswd

ServerName localhost:8080

Timeout 5
KeepAlive Off

DocumentRoot "/tmp/htdocs"

ErrorLog /tmp/fuzz_logs/error_log
LogLevel warn

TypesConfig /dev/null
AddType text/html .html
AddType text/plain .txt

<Directory "/tmp/htdocs">
    Require all granted
</Directory>

<Directory />
    Require all denied
</Directory>

# =================================================================
# /a - Encrypted session (baseline crypto fuzzing)
# Exercises: session_crypto_decode, session_crypto_encode
# Cookie value is AES-encrypted blob
# =================================================================
<Location "/a">
    Session On
    SessionEnv On
    SessionCookieName session_crypto path=/
    SessionCryptoPassphrase "fuzzing_test_key_1234567890abcdef"
    SessionMaxAge 300
</Location>

# =================================================================
# /b - Plain session (no encryption)
# Exercises:
#   - session_identity_decode: the while(pair && pair[0]) loop
#     because z->encoded comes directly from cookie (no crypto)
#   - identity_concat: the *slider='&' branch when 2+ pairs exist
#     (SessionMaxAge adds "expiry" key + fuzzer-supplied keys)
#
# Fuzzer sends: Cookie: session_plain=user%3Djohn%26role%3Dadmin
# (url-encoded: user=john&role=admin)
# =================================================================
<Location "/b">
    Session On
    SessionEnv On
    SessionCookieName session_plain path=/
    SessionMaxAge 300
</Location>

# =================================================================
# /c - SessionHeader override path
# Exercises:
#   - session_output_filter: the if(override) branch
#     SessionHeader tells mod_session to look for a response header
#     containing new session data to replace the current session
#   - session_identity_decode: decodes the override header value
#   - identity_concat '&': re-encodes multiple pairs on save
#
# Header always set injects a response header that mod_session reads
# as session override data. The fuzzer can also supply X-Session-Data
# request header which gets reflected via expr.
# =================================================================
<Location "/c">
    Session On
    SessionCookieName session_ovr path=/
    SessionMaxAge 300
    SessionHeader X-Replace-Session
    Header always set X-Replace-Session "user=testuser&role=admin&token=abc123"
</Location>

# =================================================================
# /d - Include/Exclude filtering
# Exercises:
#   - add_session_include (config parse)
#   - add_session_exclude (config parse)
#   - session_included() logic at runtime:
#     /d/app/*       -> session ON (matches include)
#     /d/api/*       -> session ON (matches include)
#     /d/api/public/ -> session OFF (matches exclude)
#     /d/other       -> session OFF (no include match)
# =================================================================
<Location "/d">
    Session On
    SessionCookieName session_filter path=/
    SessionCryptoPassphrase "fuzzing_test_key_1234567890abcdef"
    SessionMaxAge 300
    SessionInclude /d/app/
    SessionInclude /d/api/
    SessionExclude /d/api/public/
</Location>

# =================================================================
# /e - ExpiryUpdateInterval
# Exercises:
#   - set_session_expiry_update (config parse)
#   - expiry_update_time check in ap_session_save:
#     if expiry change < interval, skip save (optimization)
# =================================================================
<Location "/e">
    Session On
    SessionEnv On
    SessionCookieName session_expiry path=/
    SessionMaxAge 3600
    SessionExpiryUpdateInterval 10
</Location>

# =================================================================
# /f - Auth form login handler
# Exercises:
#   - ap_session_set (via set_session_auth in mod_auth_form)
#   - ap_session_get (via get_session_auth - checks existing session)
#   - identity_concat '&' (auth stores user+pw+site = 3+ entries)
#
# Fuzzer sends POST with body:
#   httpd_username=admin&httpd_password=admin
# Credentials: admin / admin (see htpasswd file)
# =================================================================
<Location "/f">
    Session On
    SessionCookieName session_auth path=/
    SessionMaxAge 300
    AuthType form
    AuthName myrealm
    AuthFormProvider file
    AuthUserFile /tmp/htpasswd
    AuthFormUsername httpd_username
    AuthFormPassword httpd_password
    SetHandler form-login-handler
</Location>

# =================================================================
# /g - Protected area (requires valid session auth)
# Exercises:
#   - ap_session_get (get_session_auth checks session for credentials)
#   - ap_session_load with existing session cookie
#   - session_identity_decode of stored auth data
#
# Fuzzer sends request with Cookie: session_auth=<session data>
# If session contains valid myrealm-user/myrealm-pw -> 200
# Otherwise -> redirect to /f (login)
# =================================================================
<Location "/g">
    Session On
    SessionCookieName session_auth path=/
    SessionMaxAge 300
    AuthType form
    AuthName myrealm
    AuthFormProvider file
    AuthUserFile /tmp/htpasswd
    AuthFormLoginRequiredLocation /f
    Require valid-user
</Location>

# =================================================================
# /h - Auth form logout handler
# Exercises:
#   - ap_session_set with NULL values (clears session entries)
#   - session save after clearing (dirty flag set)
#
# Any request to /h triggers logout
# =================================================================
<Location "/h">
    Session On
    SessionCookieName session_auth path=/
    SessionMaxAge 300
    AuthType form
    AuthName myrealm
    SetHandler form-logout-handler
</Location>

# =================================================================
# /i - SessionCookieName2 only (RFC2965 cookie)
# Exercises:
#   - set_cookie_name2 (lines 229-243: config parser, never called before)
#   - session_cookie_load name2_set branch (line 131-133):
#     when name2_set is true, name2 is used as cookie name for loading
#   - session_cookie_save name2_set block (lines 77-87):
#     ap_cookie_write2 (RFC2965 Set-Cookie2 header)
#
# Fuzzer sends: Cookie: session2_rfc2965=user%3Djohn%26role%3Dadmin
# =================================================================
<Location "/i">
    Session On
    SessionEnv On
    SessionCookieName2 session2_rfc2965 path=/
    SessionMaxAge 300
</Location>

# =================================================================
# /j - Dual cookie: both SessionCookieName + SessionCookieName2
# Exercises:
#   - Both name_set AND name2_set blocks in session_cookie_save
#     (lines 64-74 + lines 77-87 both fire on same request)
#   - session_cookie_load: name2_set takes priority (line 131)
#     so cookie is read from name2, but BOTH cookies are written
#   - ap_cookie_write (RFC2109) + ap_cookie_write2 (RFC2965)
#
# Fuzzer sends: Cookie: session2_dual=user%3Djohn%26role%3Dadmin
# (name2 takes priority for loading)
# =================================================================
<Location "/j">
    Session On
    SessionEnv On
    SessionCookieName session_dual path=/
    SessionCookieName2 session2_dual path=/
    SessionMaxAge 300
</Location>

# =================================================================
# /k - SessionCookieRemove On
# Exercises:
#   - set_remove (lines 245-254: config parser, never called before)
#   - conf->remove flag passed to ap_cookie_read (line 150):
#     when remove=1, the cookie is stripped from the request headers
#     after being read, hiding it from backend/CGI processes
#   - merge_session_cookie_dir_config remove path (line 193)
#
# Fuzzer sends: Cookie: session_strip=user%3Djohn%26role%3Dadmin
# =================================================================
<Location "/k">
    Session On
    SessionEnv On
    SessionCookieName session_strip path=/
    SessionCookieRemove On
    SessionMaxAge 300
</Location>

# =================================================================
# /l - Empty session save (triggers ap_cookie_remove)
# Exercises:
#   - ap_cookie_remove (line 71): when session is saved with empty
#     z->encoded, the else branch fires and removes the cookie
#   - SessionHeader override with empty value: mod_session's output
#     filter sees the header, overrides session with empty data,
#     marks dirty, and saves -> encoded is "" -> ap_cookie_remove
#   - Also exercises ap_cookie_remove2 (line 84-85) via name2
#
# Any request to /l triggers: session load -> response with empty
# X-Empty-Session header -> output filter override -> empty save
# =================================================================
<Location "/l">
    Session On
    SessionEnv On
    SessionCookieName session_empty path=/
    SessionCookieName2 session2_empty path=/
    SessionMaxAge 300
    SessionHeader X-Empty-Session
    Header always set X-Empty-Session ""
</Location>
