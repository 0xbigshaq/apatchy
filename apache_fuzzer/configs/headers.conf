# configs/headers.conf
ServerName localhost:80
HttpProtocolOptions Unsafe
RequestReadTimeout handshake=0 header=0 body=0
DocumentRoot "/tmp/htdocs"
ErrorLog "/tmp/fuzz_error.log"
TypesConfig conf/mime.types

<Directory "/">
    Require all granted
</Directory>

# Test header manipulation
Header always set X-Frame-Options "DENY"
Header always set X-Content-Type-Options "nosniff"

# Conditional headers based on request
<If "%{HTTP:X-Custom} == 'special'">
    Header set X-Special "true"
</If>

# Request header modifications
RequestHeader set X-Forwarded-Proto "https"
RequestHeader unset X-Dangerous

# Header expressions
Header set X-Request-Id "expr=%{REQUEST_ID}"
