name: Test

on:
  pull_request:
    branches: [main]
    paths:
      - "framework/src/**"
      - "framework/tests/**"
      - "framework/pyproject.toml"
      - ".github/workflows/test.yml"

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: framework
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install . ".[test]"

      - name: Run unit tests
        run: pytest -m unit -v
